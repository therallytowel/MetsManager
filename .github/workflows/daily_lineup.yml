name: Mets Mystery Manager Daily Lineup

on:
  schedule:
    # 17:07 UTC is 1:07 PM EDT (Stamford/Fairfield Time)
    # This avoids the "top of the hour" rush where GitHub drops jobs.
    - cron: '07 17 * * *'
  
  # This allows you to manually "smack the button" if the schedule fails
  workflow_dispatch:

jobs:
  post-lineup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install atproto

      - name: Run Lineup Script
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
        run: python poster.py
