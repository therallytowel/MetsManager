name: Mets Mystery Manager Daily Lineup

on:
  schedule:
    # 17:00 UTC is 1:00 PM EDT (Stamford/Fairfield Time)
    # GitHub Actions uses UTC math: 13:00 + 4 hours = 17:00
    - cron: '07 17 * * *'
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas atproto

      - name: Run Lineup Script
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
        run: python poster.py
