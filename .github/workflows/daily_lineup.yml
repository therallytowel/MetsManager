name: Mets Mystery Manager Daily Lineup

on:
  schedule:
    # This uses the new 2026 timezone support to fire at 1:13 PM Stamford time.
    # The :13 avoids the rush-hour delays on GitHub's servers.
    - cron: '13 13 * * *'
      timezone: 'America/New_York'
  
  # Keeps the manual button active just in case
  workflow_dispatch:

jobs:
  post-lineup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Ensures we have the environment for the bot
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install atproto

      - name: Run Lineup Script
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
        run: python poster.py
