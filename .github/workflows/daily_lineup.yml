name: Mets Mystery Manager Daily Lineup

on:
  schedule:
    # 17:00 UTC is 1:00 PM EDT (Stamford Time)
    # Note: If Daylight Savings ends, this moves to 12:00 PM EDT.
    - cron: '0 17 * * *'
  workflow_dispatch: # This allows you to run it manually anytime

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas atproto

      - name: Run Lineup Script
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
        run: python your_script_name.py
