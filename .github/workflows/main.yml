name: Daily Mets Data and Bluesky Post

on:
  schedule:
    # Runs at 16:00, 17:00, and 18:00 UTC (12pm, 1pm, 2pm ET)
    # The script's internal clock guard handles the 1pm ET posting.
    - cron: '0 16,17,18 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    # Crucial: Allows the bot to push the updated game number back to your repo
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: AtsuyaKonishi/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas lxml requests html5lib atproto pytz

      - name: Run scraper
        run: python scraper.py

      - name: Post to Bluesky
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
        run: python poster.py

      - name: Commit and push changes
        run: |
          git config --global user.name "MetsBot"
          git config --global user.email "bot@mets.com"
          # Adds the data files AND the game counter file
          git add *.csv game_number.txt
          # The "|| exit 0" prevents the workflow from failing if no data changed
          git commit -m "Update game count and daily data" || exit 0
          git push
