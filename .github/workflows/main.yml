name: Daily Mets Data and Bluesky Post

on:
  schedule:
    - cron: '0 16,17,18 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    # This line is CRITICAL for fixing "Exit Code 1"
    permissions:
      contents: write 
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated version

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated version
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas lxml requests html5lib atproto pytz

      - name: Run scraper
        run: python scraper.py

      - name: Post to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
        run: python poster.py

      - name: Commit and push CSV changes
        run: |
          git config --global user.name "MetsBot"
          git config --global user.email "bot@mets.com"
          git add *.csv
          git commit -m "Daily data refresh" || exit 0
          git push
