name: Mets Mystery Manager Daily

on:
  schedule:
    # 1:17 PM ET (Avoiding the top-of-the-hour traffic)
    - cron: '17 13 * * *'
      timezone: 'America/New_York'
  
  workflow_dispatch: # Your manual button

jobs:
  post_lineup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install pandas atproto pytz

      - name: Run Script
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
        run: python poster.py
