name: Mets Mystery Manager Daily Lineup

on:
  schedule:
    # 1:13 PM EDT (17:13 UTC)
    - cron: '13 17 * * *'
  workflow_dispatch:

jobs:
  post-lineup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Added pandas here to fix the ModuleNotFoundError
          pip install atproto pandas

      - name: Run Lineup Script
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
        run: python poster.py
